services:
  # --- NVIDIA CUDA (default) ---
  llamaman:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    ports:
      # Management UI
      - "5000:5000"
      # Llamaman proxy (Ollama-compatible API for OpenWebUI)
      - "42069:42069"
      # llama-server instance ports (published by spawned containers)
      - "8000-8020:8000-8020"
    volumes:
      - ./models:/models
      - ./data:/data
      - ./logs:/tmp/llama-logs
      # Docker socket - allows llamaman to spawn llama-server containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MODELS_DIR=/models
      - DATA_DIR=/data
      - LOGS_DIR=/tmp/llama-logs
      - PORT_RANGE_START=8000
      - PORT_RANGE_END=8020
      - INTERNAL_PORT_RANGE_START=9000
      - INTERNAL_PORT_RANGE_END=9020
      - LLAMAMAN_MAX_MODELS=1
      - LLAMAMAN_PROXY_PORT=42069
      - LLAMAMAN_IDLE_TIMEOUT=0
      - HEALTH_CHECK_TIMEOUT=3
      - MODEL_LOAD_TIMEOUT=300
      - REQUEST_TIMEOUT=300
      # Docker-in-Docker settings
      - LLAMA_IMAGE=ghcr.io/ggml-org/llama.cpp:server-cuda
      - LLAMA_NETWORK=llamaman-net
      - LLAMA_CONTAINER_PREFIX=llamaman-
      - GPU_TYPE=cuda
      # Restrict which GPUs are visible to all llama-server containers.
      # Comma-separated indices, e.g. "0,1,3". Leave unset to expose all GPUs.
      # - LLAMA_GPU_DEVICES=0,1,3
      # Uncomment to set a fixed Flask session secret (required for multi-replica)
      # - SECRET_KEY=change-me-to-something-random
      # Uncomment to use MariaDB/MySQL instead of JSON file storage
      # - DATABASE_URL=mysql+pymysql://llama:password@mariadb:3306/llamaman
    networks:
      - llamaman-net
    # depends_on:
    #   mariadb:
    #     condition: service_healthy
    #     required: false
    restart: unless-stopped

  # --- AMD ROCm ---
  # To use: docker compose --profile rocm up --build llamaman-rocm
  # Do NOT run both services simultaneously - they share the same ports.
  llamaman-rocm:
    build:
      context: .
      dockerfile: Dockerfile.rocm
    profiles: [rocm]
    ports:
      - "5000:5000"
      - "42069:42069"
      - "8000-8020:8000-8020"
    volumes:
      - ./models:/models
      - ./data:/data
      - ./logs:/tmp/llama-logs
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MODELS_DIR=/models
      - DATA_DIR=/data
      - LOGS_DIR=/tmp/llama-logs
      - PORT_RANGE_START=8000
      - PORT_RANGE_END=8020
      - INTERNAL_PORT_RANGE_START=9000
      - INTERNAL_PORT_RANGE_END=9020
      - LLAMAMAN_MAX_MODELS=1
      - LLAMAMAN_PROXY_PORT=42069
      - LLAMAMAN_IDLE_TIMEOUT=0
      - HEALTH_CHECK_TIMEOUT=3
      - MODEL_LOAD_TIMEOUT=300
      - REQUEST_TIMEOUT=300
      - LLAMA_IMAGE=ghcr.io/ggml-org/llama.cpp:server-rocm
      - LLAMA_NETWORK=llamaman-net
      - LLAMA_CONTAINER_PREFIX=llamaman-
      - GPU_TYPE=rocm
      # - LLAMA_GPU_DEVICES=0,1,3
      # - SECRET_KEY=change-me-to-something-random
      # - DATABASE_URL=mysql+pymysql://llama:password@mariadb:3306/llamaman
    networks:
      - llamaman-net
    # depends_on:
    #   mariadb:
    #     condition: service_healthy
    #     required: false
    restart: unless-stopped

networks:
  llamaman-net:
    driver: bridge
    name: llamaman-net
